<!DOCTYPE html>
<html>
<head>
    <title>QR Scanner</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body {
            background: linear-gradient(to right, #e0ecff, #f8fbff);
            font-family: Arial;
        }

        .scanner-card {
            width: 350px;
            background: white;
            border-radius: 15px;
        }
    </style>
</head>

<body>

<div class="container text-center mt-5">

    <!-- HEADER -->
    <div class="mb-4">
        <h2>📷 QR Scanner</h2>
        <a href="/" class="btn btn-success mt-2">🏠 Home</a>
    </div>

    <!-- SCANNER -->
    <div class="d-flex justify-content-center">
        <div class="card shadow p-4 scanner-card">

            <h5 class="mb-3">Scan Medicine QR</h5>

            <div id="reader" style="width:300px; margin:auto;"></div>

            <p id="result" class="text-primary mt-3"></p>

        </div>
    </div>

</div>

<script>
function onScanSuccess(decodedText) {

    document.getElementById("result").innerHTML = "Scanned: " + decodedText;

    let encodedData = encodeURIComponent(decodedText);

    window.location.href = "/scan_result/" + encodedData;
}

let html5QrcodeScanner = new Html5QrcodeScanner(
    "reader", { fps: 10, qrbox: 250 });

html5QrcodeScanner.render(onScanSuccess);
</script>

</body>
</html>
