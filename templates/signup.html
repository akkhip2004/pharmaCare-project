<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card p-4 shadow" style="width:350px;">
        <h3 class="text-center mb-3">📝 Signup</h3>

        <form method="POST" onsubmit="return validatePassword()">

            <input type="text" name="username" class="form-control mb-2" required>

            <div class="input-group mb-2">
                <input type="password" id="password" name="password" class="form-control" required>
                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">👁</button>
            </div>

            <small>Password must be 8+ characters and include special symbol</small>

            <button class="btn btn-success w-100 mt-2">Signup</button>
        </form>

        <p class="text-center mt-2"><a href="/login">Login</a></p>
    </div>

</div>

<script>
function togglePassword() {
    let p = document.getElementById("password");
    p.type = p.type === "password" ? "text" : "password";
}

function validatePassword() {
    let password = document.getElementById("password").value;
    let regex = /^(?=.*[!@#$%^&*]).{8,}$/;

    if (!regex.test(password)) {
        alert("Password must be at least 8 characters with special symbol");
        return false;
    }
    return true;
}
</script>

</body>
</html>
