<!DOCTYPE html>
<html>
<head>
    <title>PharmaCare</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8fbff;
            transition: 0.3s;
        }

        .dark-mode {
            background-color: #1e1e2f;
            color: white;
        }

        .card {
            transition: 0.3s;
        }

        .dark-mode .card {
            background-color: #2b2b3c;
            color: white;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .bell {
            position: relative;
            cursor: pointer;
        }

        .badge {
            position: absolute;
            top: -5px;
            right: -10px;
            background: red;
            color: white;
            border-radius: 50%;
            padding: 5px 8px;
            font-size: 12px;
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <!-- TOP BAR -->
    <div class="top-bar mb-3">

        <h2>💊 PharmaCare</h2>

        <div>
            <!-- 🔔 Notification Bell -->
            <span class="bell me-3" onclick="showAlertDetails()">
                🔔
                <span id="alertCount" class="badge">0</span>
            </span>

            <!-- 🌙 Dark Mode Toggle -->
            <button class="btn btn-dark" onclick="toggleDarkMode()">🌙</button>
        </div>

    </div>

    <!-- NAVBAR -->
    <div class="d-flex flex-wrap justify-content-center gap-2 mb-4">
        <a href="/dashboard" class="btn btn-primary">📊 Dashboard</a>
        <a href="/inventory" class="btn btn-success">📦 Inventory</a>
        <a href="/scan" class="btn btn-warning">📷 Scan QR</a>
        <a href="/logout" class="btn btn-danger">🚪 Logout</a>
    </div>

    <!-- SEARCH -->
    <div class="card p-3 mb-3">
        <h5>🔍 Search Medicine</h5>
        <form action="/search" method="POST">
            <input type="text" name="name" class="form-control mb-2" placeholder="Enter name">
            <button class="btn btn-secondary w-100">Search</button>
        </form>
    </div>

    <!-- ADD -->
    <div class="card p-3">
        <h5>➕ Add Medicine</h5>
        <form action="/add" method="POST">
            <input type="text" name="name" class="form-control mb-2" placeholder="Name">
            <input type="text" name="batch" class="form-control mb-2" placeholder="Batch">
            <input type="date" name="expiry" class="form-control mb-2">
            <input type="text" name="location" class="form-control mb-2" placeholder="Location">
            <button class="btn btn-primary w-100">Add Medicine</button>
        </form>
    </div>

</div>

<!-- 🔊 SOUND -->
<audio id="alertSound" src="https://www.soundjay.com/buttons/beep-01a.mp3"></audio>

<script>
let alerted = false;

// 🌙 DARK MODE
function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
}

// 🔔 CHECK ALERTS
function checkAlerts() {
    fetch('/check_alerts')
    .then(res => res.json())
    .then(data => {

        let totalAlerts = data.expired + data.expiring;

        document.getElementById("alertCount").innerText = totalAlerts;

        if (totalAlerts > 0 && !alerted) {
            document.getElementById("alertSound").play();
            alerted = true;
        }
    });
}

// 🔔 SHOW DETAILS
function showAlertDetails() {
    fetch('/check_alerts')
    .then(res => res.json())
    .then(data => {
        alert(
            "📢 ALERT DETAILS\n\n" +
            "Expired: " + data.expired + "\n" +
            "Expiring Soon: " + data.expiring
        );
    });
}

// 🔁 REAL-TIME CHECK
setInterval(checkAlerts, 10000);
</script>

</body>
</html>
